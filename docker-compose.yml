version: "3.9"

services:
  psar:
    build: .
    container_name: psar_analyzer
    restart: unless-stopped
    ports:
      - "8502:8502"
    volumes:
      - ./data:/app/data          # persists cached CSVs across restarts
    environment:
      - TZ=Europe/Amsterdam       # change to your timezone
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8502/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3