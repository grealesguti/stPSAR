services:
  psar:
    build: .
    container_name: stpsar_analyzer
    restart: unless-stopped
    ports:
      - "8502:8502"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Europe/Amsterdam
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8502/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3